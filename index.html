<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행운의 로또번호 연구실</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    position: relative;
    background-color: #050510;
    background-image: linear-gradient(rgba(5,5,16,0.55), rgba(5,5,16,0.75)), url('ks.bo.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: #e0e0e0;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
  }
  .aurora {
    position: fixed;
    top: -20%;
    left: -20%;
    width: 140%;
    height: 140%;
    z-index: -2;
    background: radial-gradient(circle at 20% 30%, rgba(0,255,170,0.35), transparent 45%),
                radial-gradient(circle at 70% 20%, rgba(120,80,255,0.35), transparent 45%),
                radial-gradient(circle at 50% 70%, rgba(0,180,255,0.3), transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(255,0,200,0.25), transparent 45%);
    filter: blur(40px);
    animation: auroraMove 18s ease-in-out infinite alternate;
  }
  @keyframes auroraMove {
    0%   { transform: translate(0, 0) rotate(0deg); }
    50%  { transform: translate(5%, 3%) rotate(8deg); }
    100% { transform: translate(-4%, -3%) rotate(-6deg); }
  }
  .stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
  h1 {
    font-size: 48px;
  }
  #lottoBtn {
    padding: 16px 32px;
    font-size: 20px;
    cursor: pointer;
    margin-bottom: 24px;
  }
  .lottoRow {
    display: flex;
    gap: 12px;
    margin: 8px 0;
  }
  .ball {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .lottoRow {
    opacity: 0;
    transform: scale(0.3);
  }
  .lottoRow.show {
    animation: popIn 0.45s cubic-bezier(.34, 1.56, .64, 1) forwards;
  }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.3); }
    60%  { opacity: 1; transform: scale(1.15); }
    100% { opacity: 1; transform: scale(1); }
  }
  .lottoRow.show .ball {
    animation: burstGlow 0.5s ease-out;
  }
  @keyframes burstGlow {
    0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.9); }
    60%  { box-shadow: 0 0 25px 12px rgba(255,255,255,0.4); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }
  #luckyMessage {
    margin-top: 16px;
    font-size: 22px;
    font-weight: bold;
    color: #ffd966;
  }
  #fortuneLink {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 18px;
    background: linear-gradient(135deg, #ffb347, #ffd966);
    color: #1a1a1a;
    text-decoration: none;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 2;
    opacity: 1;
    visibility: visible;
    transition: opacity 0.4s ease;
  }
  #analyzingMessage {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    padding: 0 40px;
    font-size: 28px;
    font-weight: bold;
    color: #69c8f2;
    text-align: center;
    z-index: 1;
  }
  @media (max-width: 480px) {
    h1 { font-size: 30px; }
    #lottoBtn { font-size: 22px; padding: 18px 34px; }
    .ball { width: 52px; height: 52px; font-size: 22px; }
    #luckyMessage { font-size: 24px; }
    #fortuneLink { font-size: 15px; padding: 12px 20px; }
    #analyzingMessage { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="aurora"></div>
<div class="stars" id="stars"></div>
<a id="fortuneLink" href="fortune.html">✨ 오늘의 운세 보기</a>
<h1 id="heading">행운의 로또번호 연구실</h1>
<button id="lottoBtn">랜덤 로또번호 생성</button>
<div id="analyzingMessage">연구실에서 역대 로또 1등 당첨번호를 분석하여 최고의 번호를 산출해내는중...</div>
<div id="lottoResult"></div>
<div id="luckyMessage">행운을 빕니다!</div>

<script>
  const lottoBtn = document.getElementById('lottoBtn');
  const lottoResult = document.getElementById('lottoResult');
  const analyzingMessage = document.getElementById('analyzingMessage');
  const heading = document.getElementById('heading');
  const luckyMessage = document.getElementById('luckyMessage');
  const fortuneLink = document.getElementById('fortuneLink');
  const starsContainer = document.getElementById('stars');

  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.top = Math.random() * 100 + '%';
    star.style.left = Math.random() * 100 + '%';
    star.style.animationDelay = (Math.random() * 3) + 's';
    starsContainer.appendChild(star);
  }

  function ballColor(n) {
    if (n <= 10) return '#fbc400';
    if (n <= 20) return '#69c8f2';
    if (n <= 30) return '#ff7272';
    if (n <= 40) return '#aaaaaa';
    return '#b0d840';
  }

  function generateLottoNumbers() {
    const numbers = new Set();
    while (numbers.size < 6) {
      numbers.add(Math.floor(Math.random() * 45) + 1);
    }
    return [...numbers].sort((a, b) => a - b);
  }

  lottoBtn.addEventListener('click', () => {
    lottoResult.innerHTML = '';
    lottoBtn.disabled = true;
    heading.style.visibility = 'hidden';
    lottoBtn.style.visibility = 'hidden';
    luckyMessage.style.visibility = 'hidden';
    fortuneLink.style.visibility = 'hidden';
    analyzingMessage.style.display = 'flex';

    setTimeout(() => {
      analyzingMessage.style.display = 'none';
      heading.style.visibility = 'visible';
      lottoBtn.style.visibility = 'visible';
      luckyMessage.style.visibility = 'visible';
      fortuneLink.style.visibility = 'visible';

      for (let i = 0; i < 5; i++) {
        const row = document.createElement('div');
        row.className = 'lottoRow';
        generateLottoNumbers().forEach(n => {
          const ball = document.createElement('div');
          ball.className = 'ball';
          ball.textContent = n;
          ball.style.backgroundColor = ballColor(n);
          row.appendChild(ball);
        });
        lottoResult.appendChild(row);

        setTimeout(() => {
          row.classList.add('show');
          if (i === 4) lottoBtn.disabled = false;
        }, i * 500);
      }
    }, 3000);
  });
</script>
</body>
</html>
